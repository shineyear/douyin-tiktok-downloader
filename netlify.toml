[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

[dev]
  publish = "."
  port = 8888
  targetPort = 0

# Short, Shortcut-friendly URL for the one-shot download endpoint.
# iOS Shortcuts "Get Contents of URL" -> https://digitaldialogue.com.au/api/download?url=...
[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200
  force = true

# Zero-bandwidth metadata endpoint — returns direct CDN URL + required headers.
[[redirects]]
  from = "/api/info"
  to = "/.netlify/functions/info"
  status = 200
  force = true

# MCP (Model Context Protocol) endpoint — Streamable HTTP, JSON-RPC 2.0 over POST.
# Connect from Claude.ai: customize/connectors → Add custom connector →
# https://digitaldialogue.com.au/mcp
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true
