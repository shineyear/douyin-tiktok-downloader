      save: '💾 Guardar en Fotos',

      backup: 'Descargar a Archivos',
      retry: '❌ Descarga fallida, toca para reintentar',

      cancelled: 'Cancelado — toca otra vez para reintentar',
      notAllowed: '⚠️ Toca una vez más para guardar',
      shareFailed: '❌ Compartir falló',
      downloaded: '✓ Descargado',
      notReady: 'El vídeo aún no está listo',
      parseFailed: 'Análisis fallido',
      errorPrefix: 'Error: ',
    }

  const LANG_ORDER = ['zh', 'en', 'ja', 'es'];
  const LANG_LABEL = { zh: '中文', en: 'EN', ja: '日本語', es: 'Español' };

  function detectDefaultLang() {
    const l = navigator.language.toLowerCase();
    if (l.startsWith('zh')) return 'zh';
    if (l.startsWith('ja')) return 'ja';
    if (l.startsWith('es')) return 'es';
    return 'en';
  }

  // Language resolution priority: ?lang= query param > localStorage > browser.
  // Query param lets users bookmark per-language URLs like ?lang=ja.
  const urlLang = new URLSearchParams(location.search).get('lang');
  let lang = (urlLang && LANG_ORDER.includes(urlLang))
    ? urlLang
    : (localStorage.getItem('lang') || detectDefaultLang());

  function t(key) { return I18N[lang][key] || key; }

  function applyLang() {
    const entry = I18N[lang];
    document.documentElement.lang = entry.html_lang;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const attr = el.getAttribute('data-i18n-attr');
      if (attr) el.setAttribute(attr, t(key));
      else el.textContent = t(key);
    });

    // SEO: title + description + OG/Twitter tags track the current language
    document.getElementById('pageTitle').textContent = entry.seoTitle;
    document.getElementById('metaDesc').setAttribute('content', entry.seoDesc);
    document.getElementById('ogTitle').setAttribute('content', entry.seoTitle);
    document.getElementById('ogDesc').setAttribute('content', entry.seoDesc);
    document.getElementById('twTitle').setAttribute('content', entry.seoTitle);
    document.getElementById('twDesc').setAttribute('content', entry.seoDesc);
    const ogLocale = document.querySelector('meta[property="og:locale"]');
    if (ogLocale) ogLocale.setAttribute('content', entry.og_locale);
    const canonical = document.getElementById('canonical');
    if (canonical) canonical.href = `${location.origin}${location.pathname}?lang=${lang}`;

    document.getElementById('langToggle').textContent = LANG_LABEL[lang];
    localStorage.setItem('lang', lang);

    // Keep URL in sync so the current-language page is bookmarkable.
    const params = new URLSearchParams(location.search);
    params.set('lang', lang);
    history.replaceState(null, '', location.pathname + '?' + params.toString());

    // Hreflang tags for SEO — Google uses these to serve the right language.
    document.querySelectorAll('link[rel=alternate][data-i18n-link]').forEach(el => el.remove());
    const base = location.origin + location.pathname;
    LANG_ORDER.forEach(l => {
      const link = document.createElement('link');
      link.rel = 'alternate';
      link.hreflang = I18N[l].html_lang;
      link.href = `${base}?lang=${l}`;
      link.dataset.i18nLink = '1';
      document.head.appendChild(link);
    });
  }

  // Cycles zh → en → ja → es → zh. Label always shows CURRENT language;
  // tap to move to the next one.
  document.getElementById('langToggle').onclick = () => {
    const i = LANG_ORDER.indexOf(lang);
    lang = LANG_ORDER[(i + 1) % LANG_ORDER.length];
    applyLang();
  };
  applyLang();

  const input = document.getElementById('input');
  const go = document.getElementById('go');
  const clearBtn = document.getElementById('clear');
  const result = document.getElementById('result');

  // Holds the pre-downloaded File so the "save" click can call
  // navigator.share() SYNCHRONOUSLY and keep Safari's transient user
  // activation alive. Without this, awaiting a large fetch inside the
  // click handler expires the activation and share() throws NotAllowedError.
  // The same blob is reused as the <video> src so we only hit the CDN
  // proxy ONCE per video (instead of once for preview + once for save).
  let videoState = { file: null, error: null, blobUrl: null };

  function resetVideoState() {
    if (videoState.blobUrl) URL.revokeObjectURL(videoState.blobUrl);
    videoState = { file: null, error: null, blobUrl: null };
  }

  clearBtn.onclick = () => {
    input.value = '';
    result.innerHTML = '';
    resetVideoState();
    input.focus();
  };

  go.onclick = async () => {
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    go.disabled = true;
    clearBtn.disabled = true;
    go.textContent = t('parsing');
    result.innerHTML = `<div class="loading">${t('loading')}</div>`;
    videoState = { file: null, error: null };

    try {
      const resp = await fetch('/.netlify/functions/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: text })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || t('parseFailed'));

      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const tip = isIOS ? t('tipIOS') : t('tipOther');
      const tag = '<span class="platform-tag tag-douyin">抖音</span>';
      const filename = `douyin_${data.item_id || data.video_id || Date.now()}.mp4`;

      // Douyin-only: fetch the blob straight from the CDN the server
      // pre-resolved for us. No Netlify egress. If this fails we surface
      // the error — we deliberately do NOT fall back to the proxy so a
      // CDN problem can't silently burn Netlify bandwidth.
      if (!data.direct_cdn_url) {
        result.innerHTML = `<div class="error">${t('errorPrefix')}no direct CDN URL</div>`;
        go.disabled = false; clearBtn.disabled = false; go.textContent = t('parse');
        return;
      }

      result.innerHTML = `
        <video id="vid" controls playsinline preload="none" poster="${data.cover || ''}"></video>
        <div class="title">${tag}${escapeHtml(data.title || '')}</div>
        <div class="tip">${tip}</div>
        <button class="save-btn" id="save" data-name="${filename}" disabled>${t('downloading')} 0%</button>
        <div class="progress" id="progress"><span></span></div>
        <button class="backup" id="backup" disabled>${t('backup')}</button>
      `;

      document.getElementById('save').onclick = onSaveClick;
      document.getElementById('backup').onclick = onBackupClick;
      prefetchVideo(data.direct_cdn_url, filename);
    } catch (err) {
      result.innerHTML = `<div class="error">${t('errorPrefix')}${escapeHtml(err.message)}</div>`;
    } finally {
      go.disabled = false;
      clearBtn.disabled = false;
      go.textContent = t('parse');
    }
  };

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function prefetchVideo(src, name) {
    resetVideoState();
    const btn = document.getElementById('save');
    const bar = document.getElementById('progress').querySelector('span');

    try {
      // referrerPolicy:'no-referrer' is required — Douyin CDN rejects any
      // cross-origin Referer as anti-hotlinking. No proxy fallback: if
      // this fails we fail loudly instead of leaking bandwidth.
      const resp = await fetch(src, { referrerPolicy: 'no-referrer' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      // Netlify v2 streaming functions strip Content-Length, so we often
      // don't know the total size — fall back to showing megabytes.
      const total = +resp.headers.get('Content-Length') || 0;
      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;
      let lastPaint = 0;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (!btn) continue;
        // Throttle UI updates to ~every 100ms so fast pipes still paint progress.
        const now = performance.now();
        if (now - lastPaint < 100) continue;
        lastPaint = now;
        if (total) {
          const pct = Math.round(received / total * 100);
          bar.style.width = pct + '%';
          btn.textContent = `${t('downloading')} ${pct}%`;
        } else {
          const mb = (received / 1048576).toFixed(1);
          bar.style.width = Math.min(90, received / 1048576 * 6) + '%';
          btn.textContent = `${t('downloading')} ${mb} MB`;
        }
      }
      const blob = new Blob(chunks, { type: 'video/mp4' });
      videoState.file = new File([blob], name, { type: 'video/mp4' });
      // Feed the blob to the <video> element instead of re-fetching via the
      // proxy — halves Netlify bandwidth per video.
      videoState.blobUrl = URL.createObjectURL(blob);
      const vid = document.getElementById('vid');
      if (vid) vid.src = videoState.blobUrl;
      if (btn) {
        btn.disabled = false;
        btn.textContent = t('save');
        const prog = document.getElementById('progress');
        if (prog) prog.hidden = true;
      }
      const backup = document.getElementById('backup');
      if (backup) backup.disabled = false;
    } catch (err) {
      videoState.error = err;
      if (btn) {
        btn.textContent = t('retry');
        btn.disabled = false;
        btn.dataset.retry = '1';
      }
    }
  }

  function onSaveClick(ev) {
    const btn = ev.currentTarget;

    if (btn.dataset.retry === '1') {
      btn.dataset.retry = '';
      prefetchVideo(btn.dataset.src, btn.dataset.name);
      return;
    }

    const file = videoState.file;
    if (!file) { alert(t('notReady')); return; }

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] }).then(() => {
        btn.textContent = t('shareOpened');
      }).catch((err) => {
        if (err.name === 'AbortError') btn.textContent = t('cancelled');
        else if (err.name === 'NotAllowedError') btn.textContent = t('notAllowed');
        else { btn.textContent = t('shareFailed'); alert(err.message); }
      });
      return;
    }

    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url; a.download = file.name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    btn.textContent = t('downloaded');
  }

  // Secondary "download to Files" button — uses the already-prefetched
  // blob so there is NO network call, NO re-parse, NO navigation away.
  // On iOS Safari, clicking an <a download href="blob:..."> pops the
  // native "Download?" prompt → saves to the Files app.
  function onBackupClick(ev) {
    const file = videoState.file;
    if (!file) { alert(t('notReady')); return; }
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url;
    a.download = file.name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    ev.currentTarget.textContent = t('downloaded');
  }
</script>
</body>
